<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d1017" />
  <title>TaskFlow — планировщик задач</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">TF</div>
        <div>
          <h1>TaskFlow</h1>
          <p>Ветки · темы · задачи</p>
        </div>
      </div>

      <button class="primary full" id="quickAddTask">+ Новая задача</button>

      <nav>
        <button class="nav-item active" data-filter="all">Все задачи</button>
        <button class="nav-item" data-filter="today">Сегодня</button>
        <button class="nav-item" data-filter="active">Активные</button>
        <button class="nav-item" data-filter="done">Готовые</button>
        <button class="nav-item" data-filter="important">Важные</button>
      </nav>

      <div class="side-block">
        <div class="side-title">
          <span>Ветки</span>
          <button class="tiny" id="addBranchBtn">+</button>
        </div>
        <div id="branchList" class="branch-list"></div>
      </div>

      <div class="side-block">
        <div class="side-title">
          <span>Данные</span>
        </div>
        <button class="ghost full" id="exportBtn">Экспорт JSON</button>
        <label class="ghost full file-label">
          Импорт JSON
          <input type="file" id="importFile" accept="application/json" hidden />
        </label>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">Все задачи</h2>
          <p id="dateLine"></p>
        </div>
        <button class="mobile-menu" id="mobileMenuBtn">☰</button>
      </header>

      <section class="dashboard">
        <article class="metric">
          <span>Всего</span>
          <b id="totalCount">0</b>
        </article>
        <article class="metric">
          <span>Активные</span>
          <b id="activeCount">0</b>
        </article>
        <article class="metric">
          <span>Готово</span>
          <b id="doneCount">0</b>
        </article>
        <article class="metric">
          <span>Важные</span>
          <b id="importantCount">0</b>
        </article>
      </section>

      <section class="toolbar">
        <input id="searchInput" type="search" placeholder="Поиск по задачам, темам, веткам..." />
        <select id="sortSelect">
          <option value="created">Сначала новые</option>
          <option value="priority">По важности</option>
          <option value="date">По сроку</option>
          <option value="branch">По веткам</option>
        </select>
        <button class="primary" id="addTaskBtn">+ Задача</button>
      </section>

      <section id="workspace" class="workspace"></section>
    </main>
  </div>

  <div class="mobile-bottom">
    <button data-filter="all">Все</button>
    <button data-filter="today">Сегодня</button>
    <button id="mobileAdd">＋</button>
    <button data-filter="active">Активные</button>
    <button data-filter="done">Готово</button>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="modalTitle">Добавить</h3>
        <button class="icon" id="closeModal">×</button>
      </div>
      <form id="modalForm" class="form"></form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
